server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Resolve upstream hostnames dynamically via Docker's embedded DNS
    # (avoids nginx failing to start if "backend" isn't resolvable yet
    # at config-load time).
    resolver 127.0.0.11 valid=10s;

    # React Router - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend
    location /api/ {
        set $backend_upstream http://backend:3001;
        proxy_pass $backend_upstream/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy uploaded images to backend
    location /uploads/ {
        set $backend_upstream http://backend:3001;
        proxy_pass $backend_upstream/uploads/;
        proxy_set_header Host $host;
    }
}
