services:

  # MySQL — schema + seed data baked in via database/init/*.sql, which MySQL
  # runs automatically on first startup against an empty volume (no separate
  # seeder container needed; naturally idempotent since the scripts only run
  # once per fresh data directory).
  database:
    container_name: vacations-db
    build: ./database
    environment:
      - MYSQL_DATABASE=vacations
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-RootSecure2024}
      - MYSQL_USER=${MYSQL_APP_USERNAME:-vacations_app}
      - MYSQL_PASSWORD=${MYSQL_APP_PASSWORD:-VacationsSecure2024}
    expose:
      - 3306
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # MinIO object storage (vacation images)
  minio:
    container_name: vacations-minio
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minio_admin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-MinioSecure2024}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

  # Backend REST API
  backend:
    container_name: vacations-backend
    ports:
      - 3001:3001
    environment:
      - NODE_ENV=production
      - VACATIONS_MYSQL_URI=mysql://${MYSQL_APP_USERNAME:-vacations_app}:${MYSQL_APP_PASSWORD:-VacationsSecure2024}@database:3306/vacations
      - VACATIONS_ENCRYPTION_KEY=${VACATIONS_ENCRYPTION_KEY:-dev-secret-key-change-in-production}
      - VACATIONS_OPENAI_API_KEY=${VACATIONS_OPENAI_API_KEY:-}
      - MCP_URL=http://mcp:3002/mcp
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minio_admin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-MinioSecure2024}
      - MINIO_BUCKET=vacations
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL:-http://localhost:3001/api/auth/google/callback}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
    build:
      context: ./backend
      dockerfile: Dockerfile.compose
    depends_on:
      database:
        condition: service_healthy
      minio:
        condition: service_healthy

  # MCP server
  mcp:
    container_name: vacations-mcp
    expose:
      - 3002
    environment:
      - VACATIONS_MYSQL_URI=mysql://${MYSQL_APP_USERNAME:-vacations_app}:${MYSQL_APP_PASSWORD:-VacationsSecure2024}@database:3306/vacations
    build:
      context: ./mcp
      dockerfile: Dockerfile.compose
    depends_on:
      database:
        condition: service_healthy

  # Frontend (React, served by nginx)
  frontend:
    container_name: vacations-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    build: ./frontend
    depends_on:
      - backend

volumes:
  mysql-data:
  minio-data:
