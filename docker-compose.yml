services:

  # MongoDB (with embedded TypeScript seeder — runs on first init)
  database:
    container_name: vacations-db
    build: ./database
    environment:
      - MONGO_INITDB_DATABASE=vacations
    expose:
      - 27017
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # MinIO object storage (vacation images)
  minio:
    container_name: vacations-minio
    build: ./minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

  # Backend REST API
  backend:
    container_name: vacations-backend
    ports:
      - 3001:3001
    environment:
      - NODE_ENV=production
      - VACATIONS_MONGO_URI=mongodb://database:27017/vacations
      - VACATIONS_ENCRYPTION_KEY=${VACATIONS_ENCRYPTION_KEY}
      - VACATIONS_OPENAI_API_KEY=${VACATIONS_OPENAI_API_KEY}
      - MCP_URL=http://mcp:3002/mcp
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=vacations
    build:
      context: ./backend
      dockerfile: Dockerfile.compose
    depends_on:
      database:
        condition: service_healthy
      minio:
        condition: service_healthy

  # MCP server
  mcp:
    container_name: vacations-mcp
    ports:
      - 3002:3002
    environment:
      - VACATIONS_MONGO_URI=mongodb://database:27017/vacations
    build:
      context: ./mcp
      dockerfile: Dockerfile.compose
    depends_on:
      database:
        condition: service_healthy

  # Frontend (React, served by nginx)
  frontend:
    container_name: vacations-frontend
    ports:
      - 80:80
    build: ./frontend
    depends_on:
      - backend

volumes:
  mongo-data:
  minio-data:
