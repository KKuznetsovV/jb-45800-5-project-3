services:

  # MongoDB (with embedded TypeScript seeder — runs on first init)
  database:
    container_name: vacations-db
    build: ./database
    environment:
      - MONGO_INITDB_DATABASE=vacations
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    expose:
      - 27017
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # MinIO object storage (vacation images)
  minio:
    container_name: vacations-minio
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

  # Backend REST API
  backend:
    container_name: vacations-backend
    ports:
      - 3001:3001
    environment:
      - NODE_ENV=production
      - VACATIONS_MONGO_URI=mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@database:27017/vacations?authSource=admin
      - VACATIONS_ENCRYPTION_KEY=${VACATIONS_ENCRYPTION_KEY}
      - VACATIONS_OPENAI_API_KEY=${VACATIONS_OPENAI_API_KEY}
      - MCP_URL=http://mcp:3002/mcp
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=vacations
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL:-http://localhost:3001/api/auth/google/callback}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
    build:
      context: ./backend
      dockerfile: Dockerfile.compose
    depends_on:
      database:
        condition: service_healthy
      minio:
        condition: service_healthy

  # MCP server
  mcp:
    container_name: vacations-mcp
    expose:
      - 3002
    environment:
      - VACATIONS_MONGO_URI=mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@database:27017/vacations?authSource=admin
    build:
      context: ./mcp
      dockerfile: Dockerfile.compose
    depends_on:
      database:
        condition: service_healthy

  # Frontend (React, served by nginx)
  frontend:
    container_name: vacations-frontend
    ports:
      - 80:80
    build: ./frontend
    depends_on:
      - backend

volumes:
  mongo-data:
  minio-data:
