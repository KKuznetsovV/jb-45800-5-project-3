services:

  # MySQL — schema + seed data baked in via database/init/*.sql, which MySQL
  # runs automatically on first startup against an empty volume (no separate
  # seeder container needed; naturally idempotent since the scripts only run
  # once per fresh data directory).
  database:
    container_name: vacations-db
    build: ./database
    environment:
      - MYSQL_DATABASE=vacations
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-RootSecure2024}
      - MYSQL_USER=${MYSQL_APP_USERNAME:-vacations_app}
      - MYSQL_PASSWORD=${MYSQL_APP_PASSWORD:-VacationsSecure2024}
    expose:
      - 3306
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # MinIO object storage (vacation images). Removed — images are stored in
  # a real remote S3-compatible bucket (e.g. Cloudflare R2) so any machine
  # with the right credentials sees the same images. Configure via .env,
  # see .env.example. No image files live in this repo.

  # Backend REST API
  backend:
    container_name: vacations-backend
    ports:
      - 3001:3001
    environment:
      - NODE_ENV=production
      - VACATIONS_MYSQL_URI=mysql://${MYSQL_APP_USERNAME:-vacations_app}:${MYSQL_APP_PASSWORD:-VacationsSecure2024}@database:3306/vacations
      - VACATIONS_ENCRYPTION_KEY=${VACATIONS_ENCRYPTION_KEY:-dev-secret-key-change-in-production}
      - VACATIONS_OPENAI_API_KEY=${VACATIONS_OPENAI_API_KEY:-}
      - MCP_URL=http://mcp:3002/mcp
      # Remote S3-compatible bucket (Cloudflare R2, AWS S3, ...) — required,
      # see .env.example for how to obtain these.
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_PORT=${MINIO_PORT}
      - MINIO_USE_SSL=${MINIO_USE_SSL:-true}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - MINIO_REGION=${MINIO_REGION:-auto}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL:-http://localhost:3001/api/auth/google/callback}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
    build:
      context: ./backend
      dockerfile: Dockerfile.compose
    depends_on:
      database:
        condition: service_healthy

  # MCP server
  mcp:
    container_name: vacations-mcp
    expose:
      - 3002
    environment:
      - VACATIONS_MYSQL_URI=mysql://${MYSQL_APP_USERNAME:-vacations_app}:${MYSQL_APP_PASSWORD:-VacationsSecure2024}@database:3306/vacations
    build:
      context: ./mcp
      dockerfile: Dockerfile.compose
    depends_on:
      database:
        condition: service_healthy

  # Frontend (React, served by nginx)
  frontend:
    container_name: vacations-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    build:
      context: ./frontend
      args:
        VITE_IMAGES_BASE_URL: ${VITE_IMAGES_BASE_URL:-}
    depends_on:
      - backend

volumes:
  mysql-data:
